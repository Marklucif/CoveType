name: Bug report
description: Report a reproducible problem in CoveType.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve CoveType. Do not attach private recordings or sensitive dictated text.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Hold…
        3. Observe…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CoveType version
      placeholder: 2.1.4
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac model
      placeholder: macOS 15.x, MacBook Pro M2, 16 GB
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed recordings, passwords, private text, and other sensitive information.
          required: true
