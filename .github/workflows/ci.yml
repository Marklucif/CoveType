name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift-build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build CoveType
        run: swift build -c release
      - name: Verify shortcut state machine
        run: .build/release/CoveType --hotkey-self-test
      - name: Verify anonymous usage telemetry policy
        run: .build/release/CoveType --telemetry-self-test
      - name: Verify WAV audio pipeline
        run: .build/release/CoveType --audio-pipeline-self-test
      - name: Verify custom update channel
        run: .build/release/CoveType --update-channel-self-test
      - name: Validate installer and local worker syntax
        run: |
          zsh -n scripts/install_macos.command scripts/build_app.sh scripts/create_macos_installer.sh
          if grep -Eq 'xattr[[:space:]]+-cr' scripts/install_macos.command; then
            echo 'The installer must not clear Gatekeeper quarantine metadata.' >&2
            exit 1
          fi
          grep -Fq 'xcrun stapler validate "$SOURCE_APP"' scripts/install_macos.command
          grep -Fq 'xcrun stapler validate "$INSTALL_APP"' scripts/install_macos.command
          grep -Fq 'spctl --assess --type execute' scripts/install_macos.command
          python3 -m py_compile Resources/covetype_local_ai_worker.py
          python3 -m unittest discover -s Tests -p 'test_*.py'

  telemetry-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Telemetry-Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Telemetry-Worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit shipped dependencies
        run: npm audit --omit=dev
      - name: Test telemetry worker
        run: npm test
      - name: Validate deployment bundle
        run: npm run check
