name: Deploy CoveType website

on:
  push:
    branches: [main]
    paths:
      - "CoveType-Website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Generate and validate localized pages
        run: |
          node CoveType-Website/generate-locales.cjs
          node CoveType-Website/validate-seo.cjs
          git diff --exit-code -- CoveType-Website
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload static website
        uses: actions/upload-pages-artifact@v4
        with:
          path: CoveType-Website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
